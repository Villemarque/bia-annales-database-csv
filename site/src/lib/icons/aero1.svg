       id="path28"
       style="stroke:url(#linearGradient56)" />
    <!-- Close upper stream (hugs wing top tightly) -->
    <path
       d="m 60,340 c 120,-10 220,-70 320,-80 100,-10 200,50 360,75"
       id="path29"
       style="stroke:url(#linearGradient57)" />
    <!-- Closest upper -->
    <path
       d="m 60,390 c 90,-10 190,-70 300,-90 100,-15 220,60 380,85"
       id="path30"
       style="stroke:url(#linearGradient58)" />
  </g>
  <!-- Lower streamlines - wider, slower, curving below -->
  <g
     fill="none"
