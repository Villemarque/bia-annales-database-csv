    <!-- Lift arrowhead -->
    <path
       d="m 380,140 -15,30 15,-10 15,10 z"
       fill="#ffffff"
       opacity="0.9"
       id="path42" />
  </g>
  <!-- Weight vector (downward from CG) -->
  <g
