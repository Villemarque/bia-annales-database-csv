    <!-- Close lower stream -->
    <path
       d="m 60,440 c 120,5 240,40 340,50 100,10 200,-20 340,-40"
       id="path31"
       style="stroke:url(#linearGradient60)" />
    <!-- Mid lower stream -->
    <path
       d="m 60,490 c 140,8 260,40 370,50 110,10 200,-30 310,-45"
       id="path32"
       style="stroke:url(#linearGradient61)" />
    <!-- Far lower stream -->
    <path
       d="m 60,545 c 140,7 270,30 380,35 110,5 200,-25 300,-38"
       id="path33"
       style="stroke:url(#linearGradient62)" />
  </g>
  <!-- Tiny flow arrows on streamlines (indicating direction) -->
  <!-- ========================================== -->
  <!-- LAYER 4: The Airfoil (Wing Cross-Section)  -->
  <!-- ========================================== -->
  <g
     filter="url(#shadow-extreme)"
     id="g42"
     transform="matrix(-1,0,0,1,805.15307,0)">
    <!-- Airfoil shape - classic cambered profile -->
    <path
       d="m 120,420 c 60,-5 120,-80 220,-100 80,-15 180,-10 280,30 40,15 70,40 80,65 -10,15 -40,25 -80,25 -100,5 -200,5 -280,0 -100,-5 -160,-12 -220,-20 z"
       fill="url(#airfoil-grad)"
       stroke="url(#glass-edge)"
       stroke-width="2.5"
       id="path40"
       style="display:inline;fill:url(#airfoil-grad);stroke:url(#glass-edge)" />
    <!-- Top surface glare -->
    <!-- Chord line (dashed, through the airfoil) -->
    <line
       x1="120"
       y1="420"
       x2="700"
       y2="415"
       stroke="#ffffff"
       stroke-width="1.5"
       stroke-dasharray="8, 8"
       opacity="0.2"
       id="line41"
       style="display:inline" />
    <!-- Leading edge highlight dot -->
    <!-- Trailing edge point -->
  </g>
