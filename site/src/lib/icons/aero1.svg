<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- iOS 26 Dark Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#28282a" />
      <stop offset="40%" stop-color="#101011" />
      <stop offset="100%" stop-color="#030303" />
    </linearGradient>

    <!-- Glass Edge Highlights -->
    <linearGradient id="glass-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <linearGradient id="glass-edge-subtle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Airfoil Body Gradient -->
    <linearGradient id="airfoil-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="35%" stop-color="#cccccc" stop-opacity="0.85" />
      <stop offset="70%" stop-color="#666666" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#333333" stop-opacity="0.9" />
    </linearGradient>

    <!-- Streamline gradient (fading in from left) -->
    <linearGradient id="stream-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>

    <!-- Force Arrow Gradient -->
    <linearGradient id="arrow-up-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1.0" />
    </linearGradient>

    <!-- Pressure Zone Gradients -->
    <linearGradient id="low-pressure" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
    </linearGradient>

    <!-- Depth Filters -->
    <filter id="shadow-extreme" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="30" stdDeviation="25" flood-color="#000000" flood-opacity="0.8" />
    </filter>

    <filter id="shadow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <filter id="shadow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- iOS App Icon Squircle Base -->
  <rect x="20" y="20" width="760" height="760" rx="170" fill="url(#bg-grad)" />
  <rect x="22" y="22" width="756" height="756" rx="168" fill="none" stroke="url(#glass-edge-subtle)" stroke-width="2" />

  <!-- ========================================== -->
  <!-- LAYER 1: Background Flow Field             -->
  <!-- ========================================== -->
  <!-- Subtle parallel lines representing undisturbed air far from wing -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5" stroke-linecap="round">
    <line x1="80" y1="160" x2="720" y2="160" />
    <line x1="80" y1="640" x2="720" y2="640" />
    <line x1="80" y1="120" x2="720" y2="120" />
    <line x1="80" y1="680" x2="720" y2="680" />
  </g>

  <!-- ========================================== -->
  <!-- LAYER 2: Low Pressure Zone (Above Wing)    -->
  <!-- ========================================== -->
  <path d="M 100,410 C 200,380 280,260 400,250 C 520,240 650,350 700,400" fill="url(#low-pressure)" stroke="none" />

  <!-- ========================================== -->
  <!-- LAYER 3: Streamlines (Airflow)             -->
  <!-- ========================================== -->
  <!-- Upper streamlines - compressed, faster, curving over the top -->
  <g fill="none" stroke="url(#stream-grad)" stroke-width="3" stroke-linecap="round">
    <!-- Far upper stream -->
    <path d="M 60,220 C 200,218 320,185 420,180 C 520,175 620,200 740,215" />
    <!-- Mid upper stream -->
    <path d="M 60,280 C 180,275 300,220 400,210 C 500,200 600,250 740,270" />
    <!-- Close upper stream (hugs wing top tightly) -->
    <path d="M 60,340 C 180,330 280,270 380,260 C 480,250 580,310 740,335" />
    <!-- Closest upper -->
    <path d="M 60,390 C 150,380 250,320 360,300 C 460,285 580,360 740,385" />
  </g>

  <!-- Lower streamlines - wider, slower, curving below -->
  <g fill="none" stroke="url(#stream-grad)" stroke-width="2.5" stroke-linecap="round">
    <!-- Close lower stream -->
    <path d="M 60,440 C 180,445 300,480 400,490 C 500,500 600,470 740,450" />
    <!-- Mid lower stream -->
    <path d="M 60,490 C 200,498 320,530 430,540 C 540,550 630,510 740,495" />
    <!-- Far lower stream -->
    <path d="M 60,545 C 200,552 330,575 440,580 C 550,585 640,555 740,542" />
  </g>

  <!-- Tiny flow arrows on streamlines (indicating direction) -->
  <g fill="#ffffff" opacity="0.3">
    <!-- Upper arrows -->
    <path d="M 300,210 L 310,205 L 310,215 Z" />
    <path d="M 550,210 L 560,205 L 560,215 Z" />
    <path d="M 250,270 L 260,265 L 260,275 Z" />
    <path d="M 520,265 L 530,260 L 530,270 Z" />
    <!-- Lower arrows -->
    <path d="M 300,495 L 310,490 L 310,500 Z" />
    <path d="M 550,475 L 560,470 L 560,480 Z" />
  </g>

  <!-- ========================================== -->
  <!-- LAYER 4: The Airfoil (Wing Cross-Section)  -->
  <!-- ========================================== -->
  <g filter="url(#shadow-extreme)">
    <!-- Airfoil shape - classic cambered profile -->
    <path 
      d="M 120,420 
         C 180,415 240,340 340,320 
         C 420,305 520,310 620,350 
         C 660,365 690,390 700,415 
         C 690,430 660,440 620,440 
         C 520,445 420,445 340,440 
         C 240,435 180,428 120,420 Z" 
      fill="url(#airfoil-grad)" 
      stroke="url(#glass-edge)" 
      stroke-width="2.5" 
    />

    <!-- Top surface glare -->
    <path 
      d="M 160,415 C 220,400 290,345 380,325 C 460,310 560,320 640,355" 
      fill="none" 
      stroke="#ffffff" 
      stroke-width="3" 
      stroke-linecap="round" 
      opacity="0.5" 
      filter="url(#glow-soft)" 
    />

    <!-- Chord line (dashed, through the airfoil) -->
    <line x1="120" y1="420" x2="700" y2="415" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.2" />

    <!-- Leading edge highlight dot -->
    <circle cx="120" cy="420" r="5" fill="#ffffff" opacity="0.6" filter="url(#glow-soft)" />
    <!-- Trailing edge point -->
    <circle cx="700" cy="415" r="3" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- ========================================== -->
  <!-- LAYER 5: Force Vectors                     -->
  <!-- ========================================== -->
  <!-- Lift vector (large upward arrow from center of pressure) -->
  <g filter="url(#glow)">
    <!-- Lift arrow shaft -->
    <line x1="380" y1="310" x2="380" y2="150" stroke="url(#arrow-up-grad)" stroke-width="6" stroke-linecap="round" />
    <!-- Lift arrowhead -->
    <path d="M 380,140 L 365,170 L 380,160 L 395,170 Z" fill="#ffffff" opacity="0.9" />
  </g>

  <!-- Weight vector (downward from CG) -->
  <g opacity="0.4">
    <line x1="420" y1="450" x2="420" y2="560" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <path d="M 420,570 L 408,545 L 420,552 L 432,545 Z" fill="#ffffff" />
  </g>

  <!-- ========================================== -->
  <!-- LAYER 6: Angle of Attack Indicator         -->
  <!-- ========================================== -->
  <!-- Small arc showing angle of attack -->
  <g opacity="0.35" filter="url(#glow-soft)">
    <!-- Relative wind line -->
    <line x1="80" y1="420" x2="200" y2="420" stroke="#ffffff" stroke-width="2" stroke-dasharray="6 4" />
    <!-- AoA arc -->
    <path d="M 160,420 A 50,50 0 0,0 145,405" fill="none" stroke="#ffffff" stroke-width="2" />
    <!-- Alpha symbol position marker -->
    <circle cx="148" cy="408" r="2.5" fill="#ffffff" />
  </g>

  <!-- ========================================== -->
  <!-- LAYER 7: Pressure Distribution Markers     -->
  <!-- ========================================== -->
  <!-- Small perpendicular arrows on upper surface showing low pressure -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.2" stroke-linecap="round">
    <line x1="240" y1="355" x2="240" y2="330" />
    <line x1="310" y1="335" x2="310" y2="305" />
    <line x1="380" y1="320" x2="380" y2="285" />
    <line x1="450" y1="325" x2="450" y2="295" />
    <line x1="520" y1="335" x2="520" y2="310" />
    <line x1="580" y1="350" x2="580" y2="330" />
  </g>
  <!-- Tiny arrowheads on pressure arrows -->
  <g fill="#ffffff" opacity="0.2">
    <path d="M 240,328 L 236,338 L 244,338 Z" />
    <path d="M 310,303 L 306,313 L 314,313 Z" />
    <path d="M 380,283 L 376,293 L 384,293 Z" />
    <path d="M 450,293 L 446,303 L 454,303 Z" />
    <path d="M 520,308 L 516,318 L 524,318 Z" />
    <path d="M 580,328 L 576,338 L 584,338 Z" />
  </g>

  <!-- ========================================== -->
  <!-- FINAL: iOS 26 Spatial Glare & Polish       -->
  <!-- ========================================== -->
  <path 
    d="M 20,250 C 20,100 100,20 250,20 L 550,20 C 680,20 780,100 780,250 C 780,380 480,520 370,520 C 220,520 20,380 20,250 Z" 
    fill="#ffffff" 
    opacity="0.03" 
    pointer-events="none" 
  />

  <!-- Vignette Edge -->
  <rect x="20" y="20" width="760" height="760" rx="170" fill="none" stroke="#000000" stroke-width="8" opacity="0.35" pointer-events="none" />
</svg>
